<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Evaluate AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .welcome-banner {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(236,72,153,0.1));
            border: 1px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-banner h2 { font-size: 2rem; font-family: 'Outfit'; margin-bottom: 0.5rem; }
        .welcome-banner p { color: var(--text-muted); }

        .score-pill {
            background: var(--surface);
            padding: 1rem 2rem;
            border-radius: 999px;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            font-family: 'Outfit';
        }
    </style>
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <h1 class="logo">Evaluate<span>AI</span></h1>
        <div class="nav-user">
            <div class="user-info">
                <div class="user-name" id="display-name">Loading...</div>
                <div class="user-role" id="display-role">Student</div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">
        
        <div class="welcome-banner">
            <div>
                <h2>Welcome back!</h2>
                <p>Check out your latest AI-evaluated answer sheets below.</p>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">My Evaluation Results</h2>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject</th>
                            <th>Exam Name</th>
                            <th>Score</th>
                            <th>Grade</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="student-eval-table">
                        <tr><td colspan="7" style="text-align:center">Loading results...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
