<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate AI - Intelligent Academic Evaluation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-glass-panel">
            <div class="auth-header">
                <h1 class="logo">Evaluate<span>AI</span></h1>
                <p>Automated Handwritten Answer Evaluation</p>
            </div>
            
            <div class="auth-toggle">
                <button class="toggle-btn active" id="btn-login" onclick="toggleAuthMode('login')">Login</button>
                <button class="toggle-btn" id="btn-register" onclick="toggleAuthMode('register')">Register</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="input-group" id="group-name" style="display: none;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="input-group" id="group-role" style="display: none;">
                    <label for="role">Select Role</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="teacher" checked>
                            <span class="role-badge">🧑‍🏫 Teacher</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="student">
                            <span class="role-badge">🧑‍🎓 Student</span>
                        </label>
                    </div>
                </div>

                <div id="auth-error" class="error-msg"></div>
                <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
            </form>
        </div>
    </div>
    <script src="js/api.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
